name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-title-check:
    name: PR Title Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR Title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Checking PR Title: $PR_TITLE"
          if [[ ! "$PR_TITLE" =~ ^(T-[0-9]{3}:|docs:|fix:|chore:) ]]; then
            echo "FAIL: PR title must start with 'T-XXX:', 'docs:', 'fix:', or 'chore:'"
            exit 1
          fi
          echo "PR title is valid."

  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs:
              - 'docs/**'
              - '*.md'
              - '.github/workflows/ci.yml'
            code:
              - 'apps/**'
              - 'packages/**'
              - 'scripts/**'
              - 'tests/**'
              - 'tools/**'
              - 'firmware/**'
              - 'integrations/**'
              - 'infra/**'
              - 'deploy/**'
              - '.env.example'
              - 'pyproject.toml'
              - 'tsconfig.base.json'
              - 'tsconfig.json'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
              - 'uv.lock'
              - 'package.json'
              - '.github/workflows/ci.yml'

  docs-checks:
    name: Docs & Structure Validation
    needs: changes
    if: ${{ needs.changes.outputs.docs == 'true' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Required root documents exist
        run: |
          for f in README.md ARCHITECTURE.md CONTRIBUTING.md LICENSE CLAUDE.md AGENTS.md GEMINI.md .env.example; do
            test -f "$f" || { echo "missing $f"; exit 1; }
          done
      - name: Run structure and relative link checks
        run: python scripts/check-structure

  code-checks:
    name: Code Validation (Lint, Typecheck, Test)
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    # control-plane-api (T-501) is the first Postgres-backed service — its
    # idempotency/migration tests run against a real Postgres, not SQLite,
    # so they exercise the same engine ADR-0003 mandates for production.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: doorboard
          POSTGRES_PASSWORD: doorboard
          POSTGRES_DB: doorboard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CONTROL_PLANE_TEST_DATABASE_URL: postgresql+psycopg://doorboard:doorboard@localhost:5432/doorboard_test
    steps:
      - uses: actions/checkout@v4

      - name: Enable pnpm
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python workspace
        run: uv sync --locked

      - name: Install TypeScript workspace
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: No secrets-looking files committed
        run: |
          if git ls-files | grep -E '(^|/)\.env$|\.pem$|\.key$'; then
            echo "potential secret file committed"; exit 1
          fi
          echo ok

      - name: Lint
        run: scripts/lint

      - name: Typecheck
        run: scripts/typecheck

      - name: Generated contracts are current
        run: scripts/check-generated-contracts
      - name: Test
        run: scripts/test

      - name: Door UI browser tests
        run: pnpm --filter @doorboard/door-ui test:e2e

      - name: Simulator code-path regression check (not hardware acceptance)
        run: |
          .venv/bin/python -m tests.performance.harness --report-out latency-report.txt
          cat latency-report.txt >> $GITHUB_STEP_SUMMARY
