name: Bug
description: Something violates a spec, budget, or invariant
labels: ["bug"]
body:
  - type: textarea
    id: behavior
    attributes:
      label: Observed vs expected
      description: Include the spec/budget/invariant being violated (link the doc).
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Steps, simulator scenario, or test case. Note if hardware-only.
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - critical (door critical path / privacy invariant / data loss)
        - major (feature broken, budget missed)
        - minor
    validations:
      required: true
