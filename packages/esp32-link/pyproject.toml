[project]
name = "doorboard-esp32-link"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = ["doorboard-contracts", "pydantic>=2.8,<3"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/doorboard_esp32_link", "src/doorboard_event_client"]
