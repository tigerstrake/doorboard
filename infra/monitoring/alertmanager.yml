global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'control-plane-api-webhook'

receivers:
  - name: 'control-plane-api-webhook'
    webhook_configs:
      - url: 'http://control-plane-api:8090/admin/alerts'
        send_resolved: true
        http_config:
          bearer_token_file: '/etc/alertmanager/token'
