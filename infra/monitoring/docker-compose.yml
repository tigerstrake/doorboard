name: doorboard-monitoring

services:
  prometheus:
    image: prom/prometheus:v2.52.0
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "${MONITORING_BIND_ADDR:-127.0.0.1}:9090:9090"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "$$CONTROL_PLANE_ADMIN_TOKEN" > /etc/alertmanager/token
        exec /bin/alertmanager --config.file=/etc/alertmanager/alertmanager.yml --storage.path=/alertmanager
    environment:
      CONTROL_PLANE_ADMIN_TOKEN: ${CONTROL_PLANE_ADMIN_TOKEN:-dev-admin-token}
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "${MONITORING_BIND_ADDR:-127.0.0.1}:9093:9093"

  grafana:
    image: grafana/grafana:10.4.3
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${MONITORING_BIND_ADDR:-0.0.0.0}:3000:3000"

volumes:
  prometheus_data:
  alertmanager_data:
  grafana_data:

networks:
  default:
    name: ${DOORBOARD_NETWORK:-doorboard-nuc_default}
    external: true
