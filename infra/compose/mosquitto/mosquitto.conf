# Mosquitto broker config for the NUC control plane (T-503).
#
# Trust model (ARCHITECTURE.md §2): Mosquitto is control-plane-internal
# plumbing, never in the door critical path, and never anonymous. Every
# client gets its own credential (`acl.conf`) scoped to only the topics it
# needs. This file is committed — it contains no secrets. Passwords are
# generated into `/mosquitto/data/passwd` at container start by
# `entrypoint.sh` from environment variables (never written to git).

# LAN-only exposure is a network-topology property (VLAN/firewall/no port
# forwarding — handoff §16), not something this config file can enforce; see
# infra/compose/README.md for the operator checklist.
listener 1883
protocol mqtt

allow_anonymous false
password_file /mosquitto/data/passwd
acl_file /mosquitto/config/acl.conf

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice

# Keep connection churn visible without logging message payloads (never log
# raw biometric data — payloads here are broad-label/audit events only, but
# we still don't need every PUBLISH echoed to the log).
connection_messages true
