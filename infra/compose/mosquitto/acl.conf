# Per-device topic ACLs (T-503). Usernames are fixed conventions (not
# secrets — only the matching passwords in `.env` are secret); see
# `entrypoint.sh` and infra/compose/README.md.
#
# Everything defaults to deny; each user gets exactly the access it needs.
# `doorboard/#` is the audit fan-out control-plane-api publishes to
# (docs/protocols/events.md); `homeassistant/#` is HA's MQTT discovery
# namespace.

# control-plane-api: the only writer of the audit fan-out. It never
# subscribes to anything (fire-and-forget, ARCHITECTURE.md §10).
user control-plane-api
topic write doorboard/#

# The door Pi runs door-api. It may publish door-plane events into its own
# namespace, and it subscribes to the ambient + presence fan-out to drive the
# wallboard display (door_api/mqtt_bridge.py — the MQTT→/ws bridge). Read is
# deliberately limited to `ambient/#` + `status/#` (exactly the tiles the
# wallboard renders) and never the whole `doorboard/#` fan-out, so a stolen Pi
# still cannot read session, media, or other doors' events. Presence is already
# shown on the Pi's own wallboard, so reading it here exposes nothing that isn't
# already on that screen.
user door-pi
topic write doorboard/door/#
topic read doorboard/ambient/#
topic read doorboard/status/#

# Home Assistant: reads the audit fan-out and the discovery namespace it
# manages entities through. No write access to `doorboard/#` — HA never
# originates door-plane events (ADR-0002: HA is an integration surface, not
# a dependency of the door path).
user home-assistant
topic read doorboard/#
topic readwrite homeassistant/#

# One-shot discovery publisher (infra/compose or integrations/home-assistant
# init container): writes the retained discovery config messages, nothing
# else.
user ha-discovery
topic write homeassistant/#

# Compose healthcheck probe — confined to its own throwaway topic so a
# broken healthcheck config can never masquerade as a real client.
user healthcheck
topic readwrite healthcheck/#
